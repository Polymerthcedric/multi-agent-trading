services:
  trading-bot:
    build: .
    container_name: trading-bot
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
      - "${WEBHOOK_PORT:-8000}:8000"
    environment:
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY:-placeholder_key}
      - EXCHANGE_SECRET=${EXCHANGE_SECRET:-placeholder_secret}
      - EXCHANGE_PASSPHRASE=${EXCHANGE_PASSPHRASE:-}
      - TRADINGVIEW_WEBHOOK_SECRET=${TRADINGVIEW_WEBHOOK_SECRET:-change-me}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - WHATSAPP_PHONE=${WHATSAPP_PHONE:-}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-changeme123}
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=8000
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
